name: CI

permissions:
  contents: read

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FOUNDRY_PROFILE: ci

jobs:
  check:
    name: Foundry project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Show Forge version
        run: forge --version

      - name: Run Forge fmt
        run: forge fmt --check

      - name: Run Forge build
        run: forge build --sizes

      - name: Storage layout regression gate
        run: bash script/storage-layout/check.sh --check

      - name: Slither static-analysis gate
        run: |
          pip install slither-analyzer==0.11.5
          bash script/slither/slither-gate.sh --check

      - name: Run Forge tests
        run: forge test -vvv
