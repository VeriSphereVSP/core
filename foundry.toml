[profile.default]
extra_output = ["storageLayout"]  # patch_storage_layout_gate: emit storage layout for the CI gate
src = "src"
test = "test"
script = "script"
out = "out"
libs = ["lib"]
cache = true
optimizer = true
optimizer_runs = 200 
via_ir = true

fs_permissions = [
  { access = "read-write", path = "./deployments" },
  { access = "read-write", path = "./broadcast" }
]

remappings = [
    "openzeppelin-contracts/=lib/openzeppelin-contracts/",
    "@chainlink/contracts/=lib/chainlink-brownie-contracts/contracts/",
    "@prb/math/=lib/prb-math/"
]

[rpc_endpoints]
fuji = "${FUJI_RPC}"

[etherscan]
# Fuji: No API key required; Foundry uses placeholder internally
fuji = { key = "", chain = 43113 }

# For Avalanche mainnet, RouteScan *does* require a key (optional for now)
avalanche = { key = "", chain = 43114 }


[fmt]
single_line_statement_blocks = "multi"
